name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake clang libssl-dev ccache

      - name: Configuring project
        run: |
          MAKEFLAGS="-j($nproc)" cmake --build build --verbose

      - name: Running
        run:
          ./build/MarketEngine
